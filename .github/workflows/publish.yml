name: Publish
on:
  push:
    tags: ["*"]
permissions:
  id-token: write
  contents: write
jobs:
  publish:
    name: Publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install uv
        uses: astral-sh/setup-uv@v6
      - name: Build
        run: uv build --all-packages
      - name: Publish
        run: uv publish
      - name: Generate release notes
        run: |
          uv run cz changelog "${{ github.ref_name }}" --dry-run > body.md
      - name: Create release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |-
          gh release create "${{ github.ref_name }}" --notes-file body.md
